<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #eee; font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .screen { display: none; flex-direction: column; align-items: center; gap: 1.5rem; width: 100%; max-width: 480px; }
    .screen.active { display: flex; }
    h1 { font-size: 2rem; letter-spacing: 3px; text-align: center; }
    h2 { font-size: 1.3rem; letter-spacing: 2px; text-align: center; color: #aaa; }
    input { background: #16213e; border: 1px solid #3498db; border-radius: 8px; color: #eee; font-size: 1rem; padding: 12px 16px; width: 100%; outline: none; }
    input:focus { border-color: #5dade2; }
    .btn { background: #16213e; color: #eee; border: 1px solid #3498db; border-radius: 8px; padding: 12px 24px; font-size: 1rem; cursor: pointer; width: 100%; transition: background 0.15s; text-align: center; }
    .btn:hover { background: #3498db; }
    .btn.danger { border-color: #e74c3c; }
    .btn.danger:hover { background: #e74c3c; }
    .coins { background: #16213e; border-radius: 8px; padding: 10px 20px; font-size: 1rem; border: 1px solid #f39c12; color: #f39c12; text-align: center; }
    .slot { background: #16213e; border: 1px solid #444; border-radius: 10px; padding: 1rem 1.25rem; width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .slot.empty { border-style: dashed; cursor: pointer; justify-content: center; color: #555; transition: border-color 0.15s, color 0.15s; }
    .slot.empty:hover { border-color: #3498db; color: #3498db; }
    .slot-info { display: flex; flex-direction: column; gap: 4px; }
    .slot-name { font-size: 14px; color: #aaa; }
    .slot-deck { font-size: 16px; font-weight: bold; }
    .deck-option { background: #16213e; border: 1px solid #444; border-radius: 10px; padding: 1rem 1.25rem; width: 100%; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: border-color 0.15s; }
    .deck-option:hover { border-color: #3498db; }
    .deck-option.owned { border-color: #27ae60; }
    .deck-option.locked { opacity: 0.5; cursor: default; }
    .deck-price { font-size: 13px; color: #f39c12; }
    .deck-owned { font-size: 13px; color: #27ae60; }
    .back { align-self: flex-start; background: none; border: none; color: #888; cursor: pointer; font-size: 14px; padding: 0; }
    .back:hover { color: #eee; }
    .divider { width: 100%; border: none; border-top: 1px solid #333; }
    .error { color: #e74c3c; font-size: 14px; text-align: center; }
  </style>
</head>
<body>

<!-- USERNAME SCREEN -->
<div class="screen" id="screen-username">
  <h1>CARD GAME</h1>
  <input type="text" id="username-input" placeholder="Enter your name..." maxlength="20" />
  <p class="error" id="username-error"></p>
  <button class="btn" onclick="submitUsername()">Start</button>
</div>

<!-- MAIN MENU -->
<div class="screen" id="screen-menu">
  <h1>CARD GAME</h1>
  <h2 id="menu-greeting"></h2>
  <div class="coins" id="menu-coins"></div>
  <hr class="divider" />
  <button class="btn" onclick="renderSlots()">Play</button>
  <button class="btn" onclick="showShop()">Shop</button>
  <button class="btn secondary" onclick="clearSave()">Clear save</button>
</div>

<!-- PLAY SCREEN (SAVE SLOTS) -->
<div class="screen" id="screen-play">
  <button class="back" onclick="showMenu()">← Back</button>
  <h1>PLAY</h1>
  <h2>Select a save slot</h2>
  <div id="slots-container" style="width:100%; display:flex; flex-direction:column; gap:12px;"></div>
</div>

<!-- DECK SELECTION SCREEN -->
<div class="screen" id="screen-deck-select">
  <button class="back" onclick="renderSlots()">← Back</button>
  <h1>SELECT DECK</h1>
  <h2 id="deck-select-subtitle"></h2>
  <div id="deck-select-list" style="width:100%; display:flex; flex-direction:column; gap:12px;"></div>
</div>

<!-- SHOP SCREEN -->
<div class="screen" id="screen-shop">
  <button class="back" onclick="showMenu()">← Back</button>
  <h1>SHOP</h1>
  <div class="coins" id="shop-coins"></div>
  <div id="shop-list" style="width:100%; display:flex; flex-direction:column; gap:12px;"></div>
</div>

<script>
  // ─── SAVE LAYER ───────────────────────────────────────────────────────────
  // To move to cloud: swap only these two functions.
  function saveGame(data) {
    localStorage.setItem('cardgame_save', JSON.stringify(data));
  }
  function loadGame() {
    const raw = localStorage.getItem('cardgame_save');
    return raw ? JSON.parse(raw) : null;
  }
  function clearSave() {
    if (!confirm('Delete all progress?')) return;
    localStorage.removeItem('cardgame_save');
    state = null;
    showScreen('screen-username');
  }

  // ─── DECKS CATALOGUE ──────────────────────────────────────────────────────
  const DECKS = [
    { id: 'deck_a', name: 'Deck A', price: 0 },
    { id: 'deck_b', name: 'Deck B', price: 100 },
  ];

  const STARTING_COINS = 200;
  let state = null;
  let pendingSlot = null;

  function initState(username) {
    return {
      username,
      coins: STARTING_COINS,
      ownedDecks: ['deck_a'],
      slots: [null, null, null],
    };
  }

  // ─── SCREENS ──────────────────────────────────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ─── BOOT ─────────────────────────────────────────────────────────────────
  // On load: if a save exists, go straight to menu. Otherwise show username screen.
  window.onload = () => {
    state = loadGame();
    if (state) {
      showMenu();
    } else {
      showScreen('screen-username');
    }
  };

  // ─── USERNAME ─────────────────────────────────────────────────────────────
  function submitUsername() {
    const val = document.getElementById('username-input').value.trim();
    if (!val) { document.getElementById('username-error').textContent = 'Please enter a name.'; return; }
    state = initState(val);
    saveGame(state);
    showMenu();
  }

  document.getElementById('username-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitUsername(); });

  // ─── MENU ─────────────────────────────────────────────────────────────────
  function showMenu() {
    document.getElementById('menu-greeting').textContent = 'Welcome, ' + state.username;
    document.getElementById('menu-coins').textContent = '🪙 ' + state.coins + ' coins';
    showScreen('screen-menu');
  }

  // ─── PLAY / SLOTS ─────────────────────────────────────────────────────────
  function renderSlots() {
    const container = document.getElementById('slots-container');
    container.innerHTML = '';
    state.slots.forEach((slot, i) => {
      const el = document.createElement('div');
      if (!slot) {
        el.className = 'slot empty';
        el.textContent = '+ New Game (Slot ' + (i + 1) + ')';
        el.onclick = () => openDeckSelect(i);
      } else {
        el.className = 'slot';
        el.innerHTML = `
          <div class="slot-info">
            <div class="slot-name">Slot ${i + 1}</div>
            <div class="slot-deck">${slot.deckName}</div>
          </div>
          <button class="btn danger" style="width:auto; padding: 8px 14px; font-size:13px;" onclick="deleteSlot(${i})">Delete</button>
        `;
      }
      container.appendChild(el);
    });
    showScreen('screen-play');
  }

  function deleteSlot(i) {
    state.slots[i] = null;
    saveGame(state);
    renderSlots();
  }

  // ─── DECK SELECTION ───────────────────────────────────────────────────────
  function openDeckSelect(slotIndex) {
    pendingSlot = slotIndex;
    document.getElementById('deck-select-subtitle').textContent = 'For Slot ' + (slotIndex + 1);
    const list = document.getElementById('deck-select-list');
    list.innerHTML = '';
    DECKS.forEach(deck => {
      const owned = state.ownedDecks.includes(deck.id);
      const el = document.createElement('div');
      el.className = 'deck-option' + (owned ? ' owned' : ' locked');
      el.innerHTML = `
        <span>${deck.name}</span>
        <span class="${owned ? 'deck-owned' : 'deck-price'}">${owned ? 'Owned' : '🪙 ' + deck.price}</span>
      `;
      if (owned) el.onclick = () => selectDeck(deck);
      list.appendChild(el);
    });
    showScreen('screen-deck-select');
  }

  function selectDeck(deck) {
    state.slots[pendingSlot] = { deckId: deck.id, deckName: deck.name };
    saveGame(state);
    pendingSlot = null;
    renderSlots();
  }

  // ─── SHOP ─────────────────────────────────────────────────────────────────
  function showShop() {
    document.getElementById('shop-coins').textContent = '🪙 ' + state.coins + ' coins';
    const list = document.getElementById('shop-list');
    list.innerHTML = '';
    DECKS.forEach(deck => {
      const owned = state.ownedDecks.includes(deck.id);
      const el = document.createElement('div');
      el.className = 'deck-option' + (owned ? ' owned' : '');
      el.innerHTML = `
        <span>${deck.name}</span>
        <span class="${owned ? 'deck-owned' : 'deck-price'}">${owned ? 'Owned' : '🪙 ' + deck.price}</span>
      `;
      if (!owned) el.onclick = () => buyDeck(deck);
      list.appendChild(el);
    });
    showScreen('screen-shop');
  }

  function buyDeck(deck) {
    if (state.coins < deck.price) { alert('Not enough coins.'); return; }
    state.coins -= deck.price;
    state.ownedDecks.push(deck.id);
    saveGame(state);
    showShop();
  }
</script>
</body>
</html>
